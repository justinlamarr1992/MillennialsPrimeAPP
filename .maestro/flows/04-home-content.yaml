appId: com.justappin.millennials-prime-app
# Android: com.justappin.MillennialsPrime_APP
---
# Flow: Verify home content feed loads after sign in.
# Asserts that BunnyCDN video sections are visible.

- launchApp:
    clearState: true
    clearKeychain: true

# Sign in
- assertVisible: "Enter Email"
- tapOn:
    id: "signin-email-input"
- inputText: ${MAESTRO_PRIME_EMAIL}
- tapOn:
    id: "signin-password-input"
- inputText: ${MAESTRO_PRIME_PASSWORD}
- tapOn: "Login"

# Wait for content to load (allows for network latency)
- extendedWaitUntil:
    visible: "New Episodes"
    timeout: 10000
