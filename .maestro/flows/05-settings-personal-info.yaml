appId: com.justappin.millennials-prime-app
# Android: com.justappin.MillennialsPrime_APP
---
# Flow: Navigate to Settings → Personal Information screen.
# Verifies the settings navigation stack is working.

- launchApp:
    clearState: true
    clearKeychain: true

# Sign in
- assertVisible: "Enter Email"
- tapOn:
    id: "signin-email-input"
- inputText: ${MAESTRO_PRIME_EMAIL}
- tapOn:
    id: "signin-password-input"
- inputText: ${MAESTRO_PRIME_PASSWORD}
- tapOn: "Welcome Back"
- tapOn: "Login"
- extendedWaitUntil:
    visible: "Home"
    timeout: 10000

# Navigate to Settings tab
- tapOn:
    id: "tab-settings"

# Assert settings hub is visible
- assertVisible: "Personal Information"

# Navigate into Personal Information
- tapOn: "Personal Information"

# Assert the profile form loaded
- assertVisible: "Basic Information"
