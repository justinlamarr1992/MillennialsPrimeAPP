appId: com.justappin.millennials-prime-app
# Android: com.justappin.MillennialsPrime_APP
---
# Flow: Full round-trip — sign in, then sign out.
# Verifies auth state transitions in both directions.

- launchApp:
    clearState: true
    clearKeychain: true

# Sign in
- assertVisible: "Enter Email"
- tapOn:
    id: "signin-email-input"
- inputText: ${MAESTRO_PRIME_EMAIL}
- tapOn:
    id: "signin-password-input"
- inputText: ${MAESTRO_PRIME_PASSWORD}
- tapOn: "Login"
- extendedWaitUntil:
    visible: "Home"
    timeout: 10000

# Navigate to Log Out tab
- tapOn:
    id: "tab-logout"

# Assert log out confirmation screen
- assertVisible: "Come Back Soon, There's More to Come"

# Confirm sign out
- tapOn:
    id: "logout-confirm-button"

# Assert returned to sign-in screen
- extendedWaitUntil:
    visible: "Enter Email"
    timeout: 10000
