appId: com.justappin.millennials-prime-app
# Android: com.justappin.MillennialsPrime_APP
---
# Flow: Happy path sign in with a test account.
# Requires MAESTRO_PRIME_EMAIL and MAESTRO_PRIME_PASSWORD environment variables.
# Set before running: export MAESTRO_PRIME_EMAIL=... && export MAESTRO_PRIME_PASSWORD=...

- launchApp:
    clearState: true
    clearKeychain: true

# Wait for sign-in screen to be ready
- assertVisible: "Enter Email"

# Enter credentials
- tapOn:
    id: "signin-email-input"
- inputText: ${MAESTRO_PRIME_EMAIL}

- tapOn:
    id: "signin-password-input"
- inputText: ${MAESTRO_PRIME_PASSWORD}
- tapOn: "Welcome Back"

# Submit
- tapOn: "Login"

# Assert home tab is visible (content feed loaded)
- extendedWaitUntil:
    visible: "Home"
    timeout: 10000
